version: '3'

services:
  postgres-prod:
    image: postgres:16-alpine
    container_name: glpi-integaglpi-prod-postgres
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data

  redis-prod:
    image: redis:7-alpine
    container_name: glpi-integaglpi-prod-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_prod_data:/data

  integration-service-prod:
    build:
      context: ./integration-service
      dockerfile: Dockerfile
    container_name: glpi-integaglpi-prod-integration
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres-prod
      - REDIS_HOST=redis-prod
      - PORT=3002
    ports:
      - "127.0.0.1:3002:3002"
    depends_on:
      - postgres-prod
      - redis-prod

  ai-service-prod:
    profiles:
      - ai
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: glpi-integaglpi-prod-ai
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - PORT=4001
      - AI_ENABLED=${AI_ENABLED:-false}
      - AI_PROVIDER=${AI_PROVIDER:-mock}
    ports:
      - "127.0.0.1:4001:4001"
    depends_on:
      - integration-service-prod

volumes:
  postgres_prod_data:
  redis_prod_data:
